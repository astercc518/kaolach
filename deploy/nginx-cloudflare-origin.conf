# Cloudflare「完全(严格)」模式下：边缘 HTTPS，回源 HTTPS 校验本证书。
# 将证书与私钥放到服务器安全路径（勿提交仓库），再修改下面 ssl_certificate 两行。
# 用法：复制为 /etc/nginx/sites-available/freeokcc.conf，软链到 sites-enabled，nginx -t && systemctl reload nginx
# 勿配置会拦截 /cdn-cgi 的 location（预览 HTML 仍会尽量改写为 /__preview，但兜底依赖反代到 Node）

upstream illyvoip_preview {
    server 127.0.0.1:8787;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name freeokcc.com www.freeokcc.com;

    ssl_certificate     /etc/ssl/cloudflare/freeokcc-origin.pem;
    ssl_certificate_key /etc/ssl/cloudflare/freeokcc-origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # 由 Cloudflare 终止客户端证书时，可记录真实 IP（需开启 CF「已代理」橙云）
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    real_ip_header CF-Connecting-IP;

    location / {
        proxy_pass http://illyvoip_preview;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 与浏览器地址栏一致，供预览 Node 生成 CookieYes registeredDomain、绝对链接等
        proxy_set_header X-Forwarded-Host $host;
        # 橙云 → 源站请求头继续传给 Node（首页按地区语言、真实 IP 日志等）
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header CF-IPCountry $http_cf_ipcountry;
        proxy_set_header Connection "";
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name freeokcc.com www.freeokcc.com;
    return 301 https://$host$request_uri;
}
