    <!-- Light Theme -->
    <style>
        :root{
            --bg:#f6f9ff; --bg-2:#ffffff;
            --ink:#0f172a; --ink-2:#334155; --muted:#64748b;
            --line:#e2e8f0;
            --brand:#14b8a6; --brand-2:#3b82f6;
            --ring: rgba(20,184,166,.25);
            --shadow: 0 10px 30px rgba(2,6,23,.08);
            --radius:10px;
        }
        *{box-sizing:border-box}
        html,body{height:100%}
        body{
            font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            color:var(--ink);
            background:
                radial-gradient(900px 420px at -8% -10%, rgba(59,130,246,.10), transparent 50%),
                radial-gradient(900px 420px at 110% 10%, rgba(20,184,166,.14), transparent 50%),
                var(--bg);
            -webkit-font-smoothing: antialiased;
            overflow-x:hidden;
        }
        a{color:var(--brand-2); text-decoration:none}
        a:hover{opacity:.9}

        .wrap{ max-width:1180px; margin:0 auto; padding:28px 20px 120px; }

        /* Center area */
        .center-stage{
            min-height: calc(100vh - 160px);   /* room for outer padding + helpbar */
            display:flex; align-items:center; justify-content:center;
            padding:12px 0;
        }
        @media (max-width: 576px){
            .center-stage{ min-height: calc(100vh - 150px); }
        }

        /* Stack: logo + form, tight spacing */
        .stack{
            display:flex; flex-direction:column; align-items:center;
            gap:10px;                                 /* controls space between logo and card */
            width:100%;
        }

        /* Logo above the form */
        .brand-above{ display:flex; justify-content:center; align-items:center; }
        .brand-above img{
            height:44px; width:auto; display:block;   /* display:block eliminates baseline whitespace */
        }

        /* Login card */
        .card{
            background: var(--bg-2); border:1px solid var(--line);
            border-radius:var(--radius); padding:22px; box-shadow: var(--shadow);
            width:min(560px, 100%);
        }
        .card h3{ font-weight:800; margin:0 0 4px; }
        .micro{ color:var(--ink-2); font-size:13px; margin-bottom:12px }

        .field{ position:relative; margin-bottom:12px; }
        .form-control{
            background:#ffffff!important; color:var(--ink)!important;
            border:1px solid var(--line)!important;
            border-radius:12px; padding:12px 44px 12px 44px;
            outline:none; box-shadow:none;
        }
        .form-control:focus{ border-color:var(--brand)!important; box-shadow:0 0 0 6px var(--ring)!important; }
        .ico{ position:absolute; left:12px; top:50%; transform:translateY(-50%); opacity:.8; }
        .act{ position:absolute; right:12px; top:50%; transform:translateY(-50%); opacity:.8; cursor:pointer; }

        .btn-brand{
            display:inline-flex; align-items:center; justify-content:center; gap:10px;
            width:100%; padding:12px 16px;
            background:linear-gradient(135deg, var(--brand), #10a89a);
            color:#ffffff; font-weight:800; border:none; border-radius:12px;
            box-shadow: 0 10px 24px rgba(20,184,166,.25), inset 0 1px 0 rgba(255,255,255,.25);
            transition: transform .06s ease, filter .2s ease;
        }
        .btn-brand:hover{filter:saturate(1.05) brightness(1.02)}
        .btn-brand:active{transform:translateY(1px)}

        .divider{ height:1px; background:var(--line); margin:14px 0; }
        .links{ display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; color:var(--ink-2); font-size:13px }
        .caps-hint{ color:#b91c1c; font-size:12px; display:none; margin-top:6px }
        .loginerrors{ color:#b91c1c; text-align:center }

        /* Sticky Help Bar */
        .helpbar{
            position:fixed; left:50%; transform:translateX(-50%);
            bottom:14px; width:min(1180px, calc(100% - 24px));
            background:#ffffff; border:1px solid var(--line);
            border-radius:14px; padding:10px 12px; display:flex; justify-content:space-between; align-items:center; gap:10px;
            box-shadow: var(--shadow); z-index:50;
        }
        .helpbar a{ padding:8px 12px; border-radius:10px; font-weight:700; color:#ffffff; background:linear-gradient(135deg, var(--brand-2), #60a5fa); border:none }
    </style>

<script type="text/javascript">
    (function () { 
        function initializeDarkMode() {
            if (localStorage.getItem('darkMode') === 'enabled') {
                enableDark();
                if (darkModeToggle) darkModeToggle.checked = true;
            } else {
                disableDark();
                if (darkModeToggle) darkModeToggle.checked = false;
            }
        }
 
        function enableDark() {
			DarkReader.setFetchMethod(window.fetch);
            DarkReader.enable({
                brightness: 100, // Adjust brightness
                contrast: 90,    // Adjust contrast
                sepia: 0,         // Adjust sepia
				grayscale: 50,
            });
			
			document.body.classList.add('dark-mode');
 
            const logoSmall = document.querySelector('.logo-small');
            const logoLarge = document.querySelector('.logo-large');
            if (logoSmall) logoSmall.src = 'https://illyvoip.com/assets/img/logo-white.png';
            if (logoLarge) logoLarge.src = 'https://illyvoip.com/assets/img/logo-white.png';

            localStorage.setItem('darkMode', 'enabled'); // Save state
        }
 
        function disableDark() {
            DarkReader.disable();
			
			document.body.classList.remove('dark-mode');
			
            // Update logos to default
            const logoSmall = document.querySelector('.logo-small');
            const logoLarge = document.querySelector('.logo-large');
            if (logoSmall) logoSmall.src = 'https://illyvoip.com/assets/img/logo.png';
            if (logoLarge) logoLarge.src = 'https://illyvoip.com/assets/img/logo.png';

            localStorage.setItem('darkMode', 'disabled'); // Save state
        }
 
        document.addEventListener('DOMContentLoaded', function () {
            // Find the toggle switch
            const darkModeToggle = document.querySelector('#darkModeToggle');
 
            initializeDarkMode();
 
            if (darkModeToggle) {
                darkModeToggle.addEventListener('change', function () {
                    if (darkModeToggle.checked) {
                        enableDark();
                    } else {
                        disableDark();
                    }
                });
            }
        });

        if (localStorage.getItem('darkMode') === 'enabled') {
			DarkReader.setFetchMethod(window.fetch);
            DarkReader.enable({
                brightness: 100,
                contrast: 90,
                sepia: 0,
				grayscale: 20,
            });
			
			document.body.classList.add('dark-mode');

            // Update logos to white (immediate load)
            document.addEventListener('DOMContentLoaded', function () {
                const logoSmall = document.querySelector('.logo-small');
                const logoLarge = document.querySelector('.logo-large');
                if (logoSmall) logoSmall.src = 'https://illyvoip.com/assets/img/logo-white.png';
                if (logoLarge) logoLarge.src = 'https://illyvoip.com/assets/img/logo-white.png';
            });
        }
