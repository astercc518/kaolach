    (function () { 
        function initializeDarkMode() {
            if (localStorage.getItem('darkMode') === 'enabled') {
                enableDark();
                if (darkModeToggle) darkModeToggle.checked = true;
            } else {
                disableDark();
                if (darkModeToggle) darkModeToggle.checked = false;
            }
        }
 
        function enableDark() {
			DarkReader.setFetchMethod(window.fetch);
            DarkReader.enable({
                brightness: 100, // Adjust brightness
                contrast: 90,    // Adjust contrast
                sepia: 0,         // Adjust sepia
				grayscale: 50,
            });
			
			document.body.classList.add('dark-mode');
 
            const logoSmall = document.querySelector('.logo-small');
            const logoLarge = document.querySelector('.logo-large');
            if (logoSmall) logoSmall.src = 'https://illyvoip.com/assets/img/logo-white.png';
            if (logoLarge) logoLarge.src = 'https://illyvoip.com/assets/img/logo-white.png';

            localStorage.setItem('darkMode', 'enabled'); // Save state
        }
 
        function disableDark() {
            DarkReader.disable();
			
			document.body.classList.remove('dark-mode');
			
            // Update logos to default
            const logoSmall = document.querySelector('.logo-small');
            const logoLarge = document.querySelector('.logo-large');
            if (logoSmall) logoSmall.src = 'https://illyvoip.com/assets/img/logo.png';
            if (logoLarge) logoLarge.src = 'https://illyvoip.com/assets/img/logo.png';

            localStorage.setItem('darkMode', 'disabled'); // Save state
        }
 
        document.addEventListener('DOMContentLoaded', function () {
            // Find the toggle switch
            const darkModeToggle = document.querySelector('#darkModeToggle');
 
            initializeDarkMode();
 
            if (darkModeToggle) {
                darkModeToggle.addEventListener('change', function () {
                    if (darkModeToggle.checked) {
                        enableDark();
                    } else {
                        disableDark();
                    }
                });
            }
        });

        if (localStorage.getItem('darkMode') === 'enabled') {
			DarkReader.setFetchMethod(window.fetch);
            DarkReader.enable({
                brightness: 100,
                contrast: 90,
                sepia: 0,
				grayscale: 20,
            });
			
			document.body.classList.add('dark-mode');

            // Update logos to white (immediate load)
            document.addEventListener('DOMContentLoaded', function () {
                const logoSmall = document.querySelector('.logo-small');
                const logoLarge = document.querySelector('.logo-large');
                if (logoSmall) logoSmall.src = 'https://illyvoip.com/assets/img/logo-white.png';
                if (logoLarge) logoLarge.src = 'https://illyvoip.com/assets/img/logo-white.png';
            });
        }
    })();
